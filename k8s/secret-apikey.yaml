# ApiKey authentication — use this instead of InstancePrincipal
# when running outside OKE or without node instance identity.
#
# 1. Base64-encode your OCI config and private key:
#      base64 -w0 ~/.oci/config
#      base64 -w0 ~/.oci/oci_api_key.pem
#
# 2. Fill in the values below and apply:
#      kubectl apply -f secret-apikey.yaml
#
# 3. Update deployment.yaml to mount this secret (see comments in deployment-apikey.yaml).

apiVersion: v1
kind: Secret
metadata:
  name: oci-apikey
  namespace: monitoring
type: Opaque
data:
  config: <base64-encoded ~/.oci/config>
  oci_api_key.pem: <base64-encoded ~/.oci/oci_api_key.pem>